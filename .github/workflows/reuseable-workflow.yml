name: Reusable Backend Node.js CI/CD Workflow

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
        
      node-version:
        required: true
        type: string

jobs:
  # =========================
  #  CI JOB (BUILD)
  # =========================
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint (non-blocking)
        continue-on-error: true
        run: |
          if node -e "process.exit(require('./package.json').scripts?.lint ? 0 : 1)"; then
            npm run lint
          else
            echo "No lint script found"
          fi

      - name: Run tests
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            npm test
          else
            echo "No test script found"
          fi

      - name: Build app
        run: npm run build

      - name: Prepare artifact
        run: |
          mkdir -p build
          cp -r dist build/
          cp package.json package-lock.json build/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: build

  # =========================
  #  CD JOB (DEPLOY)
  # =========================
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment_name }}

    env:
      REPO_NAME: ${{ github.event.repository.name }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts || true

      - name: Test SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} \
          "echo Connected"

      - name: Deploy artifact
        run: |
          rsync -avz \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          build/ \
          ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:/home/${{ secrets.SERVER_USERNAME }}/${{ env.REPO_NAME }}/

      - name: Run app on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }} \
          "set -e

          cd /home/${{ secrets.SERVER_USERNAME }}/${{ env.REPO_NAME }}

          # Load Node (NVM)
          export NVM_DIR=\"/home/${{ secrets.SERVER_USERNAME }}/.nvm\"
          [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\"

          # Create .env
          echo \"${{ vars.ENV_FILE_CONTENT }}\" > .env

          # Install production deps
          npm ci --omit=dev

          # Run migrations
          npm run migration:run || echo 'No migrations'

          # PM2 setup
          if ! command -v pm2 &> /dev/null; then
            npm install -g pm2
          fi

          if pm2 list | grep -q \"${{ env.REPO_NAME }}\"; then
            pm2 restart \"${{ env.REPO_NAME }}\" --update-env
          else
            PORT=${{ vars.PORT }} pm2 start npm --name \"${{ env.REPO_NAME }}\" -- start
          fi

          pm2 save
          pm2 list
          "

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
